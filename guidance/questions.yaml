      Make this choice when writing the summary spec — not now.

  - id: project-state-note-shape
    question: "Should a project's state/next-action note stay a single free-text `state_note` column, or split into structured `state` + `next_action` fields?"
    priority: medium
    status: answered
    raised_by: claude
    raised_at: 2026-06-08
    assigned_to: null
    answered_by: SPEC-030 (2026-06-09)
    notes: |
      Filed at SPEC-027 design (DEC-017, confidence 0.80 composite; this
      sub-choice ~0.78, the one piece below 0.8). DEC-017 locks a single
      free-text `state_note TEXT NOT NULL DEFAULT ''` column in the
      `0004_add_projects` migration as the minimal primitive — the user
      writes "Shipped tags; next: cut v0.2.0" freely. Resolve at SPEC-030
      design (the `brag project status` dashboard) BEFORE the dashboard
      renders the note: if the dashboard wants to surface "next action"
      distinctly from "state," a split is warranted. Under forward-only
      migrations (DEC-002) splitting later is an additive column +
      one-shot copy, not a rebuild — so deferring is cheap and YAGNI
      favors holding the single column until a renderer needs structure.

      Answered by SPEC-030 (2026-06-09), LD3: **keep single free-text
      column.** The dashboard — the named consumer that was meant to force
      this question — renders the note fine as a single column: truncated
      to 50 runes + "…" in the plain tab-separated row, carried in full in
      the `--format json` output. A one-row-per-project dashboard needs
      *less* structure than `brag project show` (which already renders the
      note as one labeled `State note:` line and reads fine), not more;
      splitting into `state` + `next_action` would either cram two columns
      into a terminal row or be re-concatenated for display (defeating the
      split). No `0005` migration, no DEC amendment — DEC-017 already
      records the single-column choice and this confirms it. Revisit
      trigger unchanged: if a future renderer genuinely needs to surface
      "next action" distinctly, it is a cheap additive column + one-shot
      copy superseding DEC-017's note sub-choice.

  - id: impact-window-calendar-vs-rolling
    question: "Should `brag impact --quarter|--month|--year` use calendar periods (current in-progress quarter/month/year) or rolling windows (now - 90/30/365 days) like `brag summary`?"
    priority: medium
    status: resolved
    raised_by: claude
    raised_at: 2026-07-06
    resolved_at: 2026-07-06
    resolved_by: orchestrator + user sign-off
    resolution: |
      CALENDAR periods, current-in-progress-period-to-date. Confirmed at
      SPEC-048 build by orchestrator sign-off, validated by the user
      (companies report by calendar quarter). `--quarter`/`--month`/`--year`
      compute the period start via `time.Date` constructors (never day
      subtraction), `--since` reuses DEC-008 `ParseSince`. The load-bearing
      divergence is enforced by TestImpactCmd_CalendarNotRolling (the
      quarter-start entry is IN, the day-before is OUT — which fails under a
      rolling now-90d reading). A `--previous` (last-completed-period)
      modifier is explicitly deferred to FUTURE scope, NOT implemented now,
      and the design does not foreclose it. Revisit only if STAGE-012's
      `brag story --audience` needs a trailing-window reading for some
      audience — add a rolling modifier then rather than flip the default.
    assigned_to: null
    notes: |
      Filed at SPEC-048 design (DEC-028, confidence 0.78 composite; this
      window-semantics sub-choice is the piece below 0.8 that drags the
      average — the envelope-inheritance sub-choices are 0.85-0.9). DEC-028
      locks CALENDAR periods, deliberately diverging from DEC-014 choice (6)
      which locks ROLLING windows for `brag summary`/`review`. Rationale:
      `brag impact` feeds the v0.4.0 story surface (STAGE-012 `brag story
      --audience`), whose audiences (manager/skip/exec) think in reporting
      periods — "what did you ship this quarter?" means the calendar
      quarter, not a trailing 90 days. Rolling is defensible and simpler;
      a user could reasonably expect either. Resolve/confirm when STAGE-012
      wires the story surface onto this digest: if `brag story` needs the
      trailing-window reading for any audience, revisit (add a rolling
      modifier rather than flip the default). Second, related soft spot:
      DEC-028 chose the CURRENT in-progress period (up to now), not the
      previous COMPLETE one; a `--previous` modifier is the clean future
      addition if the complete-period workflow materializes. Neither
      changes the schema — both are flag/semantics-only.

  - id: story-profile-override-file-format
    question: "What is the exact file format, config path, and precedence for user-defined `brag story` audience shaping profiles (the override layer over the bundled defaults)?"
    priority: medium
    status: resolved
    raised_by: claude
    raised_at: 2026-07-06
    resolved_at: 2026-07-06
    resolved_by: orchestrator sign-off (SPEC-049 build)
    assigned_to: null
    resolution: |
      LOCKED at SPEC-049 build by orchestrator sign-off. (a) Format: a
      flat `key: value` file with no nesting/lists, parsed by a hand-rolled
      stdlib `bufio` parser (≈30 lines) — NO new YAML dependency
      (`no-new-top-level-deps-without-decision` kept clean; go.mod carries
      no YAML dep). Keys: name, default_window, impact_threads_only,
      drop_impactless_beats, fold_small_threads, thread_order, candor,
      directive. Unknown keys and non-boolean booleans are errors (typo
      protection). (b) Path: `~/.bragfile/story-profiles/<name>.yaml`,
      resolved through an injectable package-var seam (`story.overrideDir`)
      for tests. (c) Precedence: OVERRIDE-WINS by name — a user
      `<name>.yaml` fully shadows the bundled default of the same name (no
      field-merge). (d) Malformed handling: REJECT with an error naming the
      file — NO silent fallback to the bundled default (AC-9). Paired
      tests: TestLoadProfile_BundledDefaults / _UserOverrideShadowsBundled
      / _UnknownAndMalformed (all green). The override path stays lightly
      exercised until a genuine third-party profile appears (SPEC-050's
      manager/skip ship as bundled defaults, not user-override files);
      revisit the merge-vs-replace + nested-config question only if a real
      profile needs nested/list config, which then requires a DEC for a
      YAML dep. The extension file suffix stays `.yaml` even though the
      parser is a subset — a real YAML file with only flat keys parses
      identically, so upgrading to a YAML engine later is non-breaking.
    notes: |
      Filed at SPEC-049 design (DEC-029, composite confidence 0.72). The
      profiles-as-DATA *mechanism* is high-confidence and locked (DEC-029
      choice 2): a profile = selection filter + threading policy +
      altitude/length + framing-directive pointer, sourced from a bundled
      default asset (embed.FS) with an optional user override. What is
      below 0.8 is the *concrete surface*: (a) the override file format —
      YAML is the lean; JSON/TOML are alternatives; (b) the path —
      `~/.bragfile/story-profiles/<name>.yaml` vs a `config`-dir location
      vs a single `story-profiles.yaml` map file; (c) precedence when a
      user file shadows a bundled default name (override-wins vs
      merge-fields); (d) malformed/partial-profile handling (reject vs
      fall back to default vs merge). SPEC-049 SHIPS the bundled `me`/`exec`
      defaults and the loader that reads them; it specifies the override
      path + format + precedence as a locked design decision so build does
      not guess, but the surface is new (no prior config-file-as-data
      precedent in the repo beyond flags + embedded migrations), hence the
      confidence flag. Resolve/harden when the first real user profile is
      authored (SPEC-050 `manager`/`skip` are shipped-as-bundled-defaults,
      NOT user-override files, so they exercise the loader but not the
      override precedence — the override path stays lightly exercised until
      a genuine third-party profile appears).

  - id: story-two-audience-slice-proves-divergence
    question: "Do the two shipped audiences (`me`, `exec`) prove `brag story`'s 'same in theory, diverge in practice' thesis convincingly, or does the release need `manager` too to be persuasive?"
    priority: medium
    status: resolved
    raised_by: claude
    raised_at: 2026-07-06
    resolved_at: 2026-07-06
    resolved_by: orchestrator sign-off (SPEC-049 build)
    assigned_to: null
    resolution: |
      RESOLVED at SPEC-049 build by orchestrator sign-off: ship the
      gradient ENDPOINTS `me` and `exec` now; the middle (`manager`/`skip`)
      lands in SPEC-050 as config-only bundled defaults (the zero-Go-change
      extensibility proof). The endpoints prove the thesis convincingly —
      the live me-vs-exec run over the SAME corpus produces demonstrably
      different bundles by RULE, not tone: `me` = 4 threads / Beats 6/6 /
      impact-less beats + the (no project) thread KEPT / alpha-ASC order;
      `exec` = 3 threads / Beats 4/6 / impact-less beats DROPPED + the
      (no project) thread FOLDED / impact-beat-count-DESC order (beta
      leads). That divergence lives in the deterministic body (threads,
      beats, throughline), not only the framing directive, and is locked by
      byte-exact goldens (Tests 1/2/3) + the live-DB assertion (Test 15).
      The mechanism is data-driven, so pulling `manager` forward would have
      been additive config with zero mechanism change — deferring it does
      not weaken the headline. `manager` in SPEC-050 then demonstrates the
      extensibility claim explicitly (adding an audience touches no Go).
    notes: |
      Filed at SPEC-049 design (DEC-029 choice 4). SPEC-049 ships the
      gradient ENDPOINTS — `me` (candid / every thread / impact-less beats
      kept / low altitude / many arcs) and `exec` (promotional / impact-
      bearing threads only / small threads folded / impact-less beats
      dropped / high altitude / one headline arc) — because the endpoints
      maximally exercise the mechanism and give the sharpest byte-golden
      contrast. The open question is whether shipping only the endpoints
      reads as "we built two hard-coded modes" rather than "we built an
      extensible gradient." Mitigations already in the design: (1) the
      mechanism is data-driven, so `manager` is a config-only addition;
      (2) SPEC-050 adds `manager`/`skip` explicitly to DEMONSTRATE the
      zero-Go-change extensibility. If the orchestrator judges two
      endpoints insufficient for the v0.4.0 narrative headline, pull
      `manager` forward into SPEC-049 (it is additive config; it does not
      change the mechanism or the bundle shape). Recorded so the
      slice-vs-whole call is explicit, not silent.
