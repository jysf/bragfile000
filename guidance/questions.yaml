# guidance/questions.yaml
# Open questions under active investigation. Agents can see what we're
# still figuring out and avoid re-deriving answers in isolation.
#
# Every question MUST have:
#   - id: stable kebab-case identifier
#   - question: the question in one sentence
#   - priority: critical | high | medium | low
#   - status: open | investigating | answered
#   - raised_by: human | claude | <agent-id>
#   - raised_at: YYYY-MM-DD
#   - assigned_to: null | <agent-id> | <human>
#
# When a question is answered, either:
#   (a) update status to "answered" and link to the DEC-XXX that records the answer, or
#   (b) delete the question if it was resolved without a formal decision.

questions:
  - id: tags-storage-model
    question: "Is comma-joined TEXT still the right shape for tags once `list --tag` and FTS5 `search` are implemented, or do we need to migrate to a normalized tags/entry_tags pair?"
    priority: medium
    status: answered
    raised_by: claude
    raised_at: 2026-04-19
    assigned_to: null
    answered_by: SPEC-007 (2026-04-20)
    notes: |
      DEC-004 picked comma-joined TEXT at confidence 0.65 for MVP. The
      risk is (1) the "auth" matching "authoring" false-positive unless
      LIKE is wrapped with sentinel commas, and (2) FTS5 tokenization
      may produce odd search behavior on comma-separated terms.
      Revisit during STAGE-002 when `list --tag` and `search` ship.
      If either of those specs needs more than ~20 extra lines of code
      to get right with comma-joined tags, that's the signal to
      normalize.

      Answered by SPEC-007 (2026-04-20): the sentinel-comma LIKE
      pattern (`',' || tags || ',' LIKE '%,<tag>,%'`) resolves concern
      (1) in a single SQL line with no normalization and no new
      migration. A regression test (`TestList_TagFilterNoFalsePositive`)
      pins the `"auth"` vs `"authoring"` case. DEC-004's Validation
      section now references SPEC-007. Concern (2) re-opens if/when
      FTS5 lands in SPEC-011 — kept this question for the record,
      but the MVP-scale answer is "comma-joined stays".

  - id: tag-ordering-projection
    question: "Should the reconstructed Entry.Tags projection preserve each entry's original tag order (via the taggings.position column) or is name-ASC sufficient — i.e. can we drop the position column?"
    priority: low
    status: open
    raised_by: claude
    raised_at: 2026-06-06
    assigned_to: null
    notes: |
      DEC-015 (SPEC-025) reconstructs Entry.Tags via
      GROUP_CONCAT(tags.name, ',' ORDER BY taggings.position). The
      `position` column was added so a canonical-but-unsorted input
      ("perf,auth") round-trips byte-identically instead of being
      sorted to "auth,perf". This is the only DEC-015 sub-choice below
      0.8 confidence (~0.75).

      The catch: every tag string that currently round-trips through the
      Store in the test corpus (and, as far as we can tell, in practice)
      is already alphabetically ordered, so `name ASC` ordering with NO
      position column would pass every existing test today. `position`
      is therefore insurance whose value is not yet observable.

      Revisit trigger: if, by the end of PROJ-002 (or first real v0.2.x
      dogfooding), no consumer depends on per-entry tag order AND no
      production entry is observed with unsorted tags, drop the
      `position` column in a follow-up migration and switch the
      projection to `ORDER BY tags.name`. Until then, keep `position` —
      it is the byte-faithful choice for "lossless and invisible."

  - id: tag-rename-into-existing
    question: "Should `brag tag rename <old> <new>` error when `<new>` already exists (forcing the user to `merge`), or silently auto-merge `<old>` into `<new>`?"
    priority: low
    status: open
    raised_by: claude
    raised_at: 2026-06-07
    assigned_to: null
    notes: |
      DEC-016 (SPEC-026) choice 2 locks **error, not auto-merge**:
      rename is a pure single-statement UPDATE; when `<new>` collides
      with the `tags.name` UNIQUE constraint, rename returns a user
      error pointing at `brag tag merge`. Rationale: principle of least
      surprise — a command named "rename" should not silently delete a
      second tag and re-point its memberships. Keeps rename/merge
      orthogonal (rename = "misnamed"; merge = "same concept, combine").

      This is the softest DEC-016 sub-choice (~0.8). The defensible
      alternative is "do what I mean": treat rename-into-existing as an
      implicit merge. It is the choice most likely to attract a real
      user request once v0.2.x is dogfooded.

      Revisit trigger: if a user reports that rename-into-existing
      *should* just merge (or finds the two-step rename→error→merge
      annoying in practice), reconsider — the change is small (route
      RenameTag's ErrTagExists path into MergeTags) but it is a contract
      change and would amend DEC-016 choice 2.

  - id: shareable-ids
    question: "Will we ever need IDs that are portable across machines (sync, sharing, export-import), and if so when do we add a ULID column alongside the integer PK?"
    priority: low
    status: open
    raised_by: claude
    raised_at: 2026-04-19
    assigned_to: null
    notes: |
      DEC-005 picked INTEGER AUTOINCREMENT at confidence 0.70. Revisit
      if and when sync or cross-machine export enters scope (earliest
      in a post-MVP project). The migration path is additive: add a
      `ulid TEXT UNIQUE` column, backfill, switch user-facing CLI to
      accept either form. No data loss.

  - id: editor-template-format
    question: "What exact format does the editor-launch markdown buffer use — YAML front-matter plus a body, or a simpler key-value header?"
    priority: medium
