# guidance/constraints.yaml
# Repo-level rules that all agents (and humans) working in this repo
# must follow. Maps to ContextCore agentGuidance.constraints.
#
# Every constraint MUST have:
#   - id: stable kebab-case identifier
#   - rule: one sentence
#   - severity: blocking | warning | advisory
#   - paths: glob list (use ["**"] for repo-wide)
#   - added_by: human | claude | <agent-id>
#   - added_at: YYYY-MM-DD
#   - rationale: why (link to DEC-XXX preferred)

constraints:
  - id: no-secrets-in-code
    rule: "Never commit API keys, tokens, passwords, or credentials. Use environment variables referenced via .env.example."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Baseline security hygiene."

  - id: no-cgo
    rule: "Do not introduce any dependency that requires CGO. The build must remain pure Go so goreleaser can cross-compile on any arch without a C toolchain."
    severity: blocking
    paths: ["**/*.go", "go.mod", "go.sum"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "DEC-001 — pure-Go sqlite driver; STAGE-004 distribution depends on cross-compile working out of the box."

  - id: no-sql-in-cli-layer
    rule: "Files under internal/cli/ must not import database/sql or any SQL driver. All persistence goes through internal/storage."
    severity: blocking
    paths: ["internal/cli/**"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Architecture principle 2 (architecture.md) — CLI is a thin shell over storage. Keeps commands testable and future frontends (TUI, API) feasible."

  - id: storage-tests-use-tempdir
    rule: "Storage-layer tests MUST use t.TempDir() for the DB path, never a shared or on-disk path. No test relies on ~/.bragfile/."
    severity: blocking
    paths: ["internal/storage/**_test.go"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Tests must be hermetic and parallel-safe; the user's real DB is never a test fixture."

  - id: migrations-are-append-only
    rule: "Never edit or rename a migration file once it has been merged to main. Reversal or correction happens by adding a new forward migration."
    severity: blocking
    paths: ["internal/storage/migrations/**"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "DEC-002 — embedded migrations; applied-version tracking depends on filenames being stable."

  - id: timestamps-in-utc-rfc3339
    rule: "All timestamps stored in SQLite are RFC3339 UTC, written from Go (time.Now().UTC().Format(time.RFC3339)), not via SQLite CURRENT_TIMESTAMP."
    severity: blocking
    paths: ["internal/storage/**"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Explicit tz avoids daylight-savings and UTC-drift surprises. Data-model doc calls this out."

  - id: test-before-implementation
    rule: "Failing tests are written as part of the spec during design. Implementation makes those tests pass. Do not skip this order."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "TDD discipline; provides automatic verification of acceptance criteria."

  - id: no-new-top-level-deps-without-decision
    rule: "Do not add a new top-level dependency to go.mod without first emitting a DEC-XXX file justifying the choice."
    severity: warning
    paths: ["go.mod", "go.sum"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Dependencies are forever. Force deliberation. Especially relevant given no-cgo."

  - id: errors-wrap-with-context
    rule: "Errors returned from internal/storage or internal/cli MUST be wrapped with context via fmt.Errorf(\"<operation>: %w\", err). Bare err returns are not acceptable."
    severity: warning
    paths: ["internal/**/*.go", "cmd/**/*.go"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Error messages need to be legible at the CLI boundary. Go 1.13+ error wrapping is the convention."

  - id: stdout-is-for-data-stderr-is-for-humans
    rule: "Command output intended for scripting (IDs, tabular rows, export bodies) goes to stdout. Human-readable prompts, errors, and prefixed messages go to stderr."
    severity: blocking
    paths: ["internal/cli/**", "cmd/**"]
    added_by: claude
    added_at: 2026-04-19
    rationale: "Pipeability. CLI-contract.md specifies this; violating it breaks `id=$(brag add ...)`."

  - id: one-spec-per-pr
    rule: "Each PR must reference exactly one SPEC-XXX in its description. Bundled changes are rejected."
    severity: blocking
    paths: ["**"]
    added_by: human
    added_at: 2026-04-19
    rationale: "Keeps review loop tractable and traceable."
